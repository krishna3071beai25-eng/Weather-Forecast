<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Predictor</title>
    
    <style>
        /* === CSS Styling === */
        
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Trendy Dark Theme + Mountain Rain Background */
        body {
            /* A fallback color just in case the image takes time to load */
            background-color: #0f172a; 

            /* We stack two backgrounds:
               1. A semi-transparent dark gradient overlay (rgba 0,0,0, 0.7) to ensure text is readable.
               2. The actual mountain/rain image URL.
            */
            background-image: 
                linear-gradient(to bottom, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)),
                url('https://images.unsplash.com/photo-1561553873-e8491a564fd0?q=80&w=2074&auto=format&fit=crop&ixlib=rb-4.0.3'); /* Example Image from Unsplash */

            /* Ensure the background covers the entire screen nicely */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Keeps the background fixed in place if the content were to scroll */
            background-attachment: fixed;

            color: #ffffff;
            overflow: hidden;
            height: 100vh; /* Ensures body takes full height for background */
        }

        /* Full-screen flex container */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            backdrop-filter: blur(2px); /* Adds a very subtle blur to the background for depth */
        }

        .content-container {
            padding: 2rem;
            max-width: 900px;
        }

        /* Gradient Text for the Heading */
        .main-heading {
            font-size: 4.5rem;
            font-weight: 800;
            /* Creates a modern metallic/white-to-gray gradient text effect */
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2.5rem;
            line-height: 1.1;
            letter-spacing: -1.5px;
            /* Added text shadow to separate it from the busy background image */
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Vibrant Glowing Link Button */
        .cta-button {
            display: inline-block;
            text-decoration: none;
            /* A slightly deeper blue/purple gradient to match the rainy mood */
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 1rem 3rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border */
        }

        /* Hover and active effects */
        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 35px rgba(99, 102, 241, 0.7);
            filter: brightness(1.15); 
        }

        .cta-button:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .main-heading {
                font-size: 3rem;
            }
            .cta-button {
                font-size: 1.1rem;
                padding: 1rem 2.5rem;
            }
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <div class="content-container">
            <h1 class="main-heading">Predict Weather Forecast Instantly</h1>
            <a href="index.html" class="cta-button">Get Started</a>
        </div>
    </main>

</body>
</html>
